<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d1b4c">
<!-- iOS Safari / "Add to Home Screen" support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CBT Exam">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<title>Ultimate CBT Exam</title>
<style>
  :root{
    --navy:#0d1b4c;
    --navy-2:#132568;
    --accent:#1976D2;
    --green:#2E7D32;
    --red:#c62828;
    --orange:#E65100;
    --purple:#6A1B9A;
    --bg:#eef2f9;
    --card:#ffffff;
    --muted:#6b7280;
    --radius:14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
  html{height:100%;background:var(--bg);}
  html,body{overscroll-behavior-y:none;}
  body{
    margin:0;
    height:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:#1a1a1a;
    -webkit-text-size-adjust:100%;
  }
  #app{
    max-width:720px;
    margin:0 auto;
    min-height:100%;
    display:flex;
    flex-direction:column;
    padding-top:var(--safe-top);
    padding-bottom:var(--safe-bottom);
  }
  .screen{display:none;flex:1;flex-direction:column;}
  .screen.active{display:flex;}

  /* ---------- Header ---------- */
  .header{
    background:linear-gradient(135deg,var(--navy),var(--navy-2));
    color:#fff;
    padding:18px 20px 16px;
    text-align:center;
    position:relative;
  }
  .header h1{margin:0 0 4px;font-size:1.35rem;font-weight:800;letter-spacing:.3px;}
  .header p{margin:0;font-size:.85rem;color:#b9c6ee;}
  .header .sub-info{font-size:.78rem;color:#cfe0ff;margin-top:4px;}
  .icon-btn{
    position:absolute; top:12px;
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.35);
    color:#fff; border-radius:20px;
    padding:7px 12px; font-size:.75rem; font-weight:600;
    cursor:pointer;
  }
  .icon-btn:active{background:rgba(255,255,255,.3);}
  .icon-btn.logout{right:12px; background:rgba(198,40,40,.85); border-color:rgba(198,40,40,1);}
  .icon-btn.subject{right:12px;}
  .icon-btn.back{left:12px;}

  /* ---------- Generic layout ---------- */
  .content{flex:1;padding:18px;padding-bottom:28px;}
  .card{
    background:var(--card);
    border-radius:var(--radius);
    padding:18px;
    box-shadow:0 2px 10px rgba(20,30,70,.08);
    margin-bottom:16px;
  }
  .card h2{margin:0 0 12px;font-size:1.05rem;color:var(--navy);}
  label.field-label{display:block;font-size:.82rem;color:var(--muted);margin:10px 0 6px;}
  select, input[type=text]{
    width:100%; padding:12px 14px; border-radius:10px;
    border:1.5px solid #d7dcea; font-size:1rem; background:#fbfcff;
    -webkit-appearance:none; appearance:none;
  }
  select:focus, input[type=text]:focus{outline:none;border-color:var(--accent);}

  button{font-family:inherit; cursor:pointer; border:none; touch-action:manipulation;}
  .btn{
    display:block; width:100%; padding:14px 16px;
    border-radius:12px; font-size:1rem; font-weight:700;
    color:#fff; background:var(--accent); margin-top:10px;
    transition:transform .05s ease;
    touch-action:manipulation;
    -webkit-appearance:none;
  }
  .btn:active{transform:scale(.98);}
  .btn.green{background:var(--green);}
  .btn.gray{background:#757575;}
  .btn.orange{background:#E65100;}
  .btn.purple{background:var(--purple);}
  .btn.outline{background:#fff;color:var(--accent);border:2px solid var(--accent);}
  .btn.small{padding:10px 12px;font-size:.85rem;}
  .status-msg{
    min-height:22px; text-align:center; font-size:.85rem;
    font-weight:600; margin-top:10px; padding:0 4px;
  }
  .divider{height:1px;background:#e2e6f0;margin:18px 0;}

  /* ---------- Subject cards ---------- */
  .subject-card{
    display:flex; align-items:center; gap:14px;
    background:var(--card); border-radius:var(--radius);
    padding:16px; margin-bottom:12px;
    box-shadow:0 2px 10px rgba(20,30,70,.08);
    border-left:6px solid var(--accent);
  }
  .subject-card .emoji{font-size:2rem; flex-shrink:0;}
  .subject-card .info{flex:1; min-width:0;}
  .subject-card .info h3{margin:0 0 3px;font-size:1.05rem;}
  .subject-card .info p{margin:0;font-size:.78rem;color:var(--muted);}
  .subject-card .go-btn{
    padding:10px 16px;border-radius:10px;color:#fff;font-weight:700;font-size:.85rem;
    flex-shrink:0;
  }

  /* ---------- Exam ---------- */
  .exam-topbar{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.06);}
  .timer{font-weight:800;font-size:1.05rem;color:var(--red);}
  .qcount{font-size:.85rem;color:var(--muted);}
  .progress-wrap{height:8px;background:#e3e7f2;margin:0 18px;border-radius:6px;overflow:hidden;}
  .progress-bar{height:100%;background:var(--accent);width:0%;transition:width .2s;}

  .question-box{
    background:#fff;border-radius:var(--radius);
    padding:20px;margin:16px 18px 8px;
    box-shadow:0 2px 10px rgba(20,30,70,.08);
  }
  .q-num{font-size:.8rem;font-weight:700;color:var(--accent);margin-bottom:8px;}
  .q-text{font-size:1.08rem;line-height:1.45;margin-bottom:16px;color:#111;}
  .option{
    display:flex;align-items:center;gap:12px;
    padding:13px 14px;border-radius:10px;
    border:1.5px solid #e1e5f0;margin-bottom:10px;
    background:#fbfcff;font-size:.98rem;
    touch-action:manipulation;-webkit-user-select:none;user-select:none;
  }
  .option.selected{border-color:var(--accent);background:#e8f1fd;}
  .option input{width:18px;height:18px;flex-shrink:0;accent-color:var(--accent);}
  .option .opt-text{flex:1;}

  .exam-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 18px 6px;}
  .exam-actions .btn{margin-top:0;}
  .exam-actions-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 18px 14px;}
  .stats-line{text-align:center;font-size:.8rem;color:var(--muted);padding-bottom:10px;}

  /* ---------- Review ---------- */
  .review-item{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
  .review-item.correct{border-left:5px solid var(--green);}
  .review-item.wrong{border-left:5px solid var(--red);}
  .review-item.unanswered{border-left:5px solid var(--orange);}
  .review-item .rq{font-weight:700;margin-bottom:8px;font-size:.95rem;}
  .review-opt{padding:6px 10px;font-size:.85rem;border-radius:6px;margin-bottom:4px;}
  .review-opt.correct-ans{background:#e6f4ea;color:var(--green);font-weight:700;}
  .review-opt.wrong-ans{background:#fdecea;color:var(--red);font-weight:700;}

  /* ---------- Leaderboard / profile ---------- */
  .lb-row{display:flex;justify-content:space-between;font-size:.85rem;padding:6px 0;border-bottom:1px dashed #e5e8f0;}
  .lb-row:last-child{border-bottom:none;}
  .medal{font-weight:700;}

  footer.note{text-align:center;font-size:.7rem;color:#9aa2b5;padding:10px 20px 24px;}

  @media (min-width:600px){
    .exam-actions{grid-template-columns:repeat(4,1fr);}
    .exam-actions-row2{display:none;}
  }
</style>
</head>
<body>
<div id="app">

  <!-- ===================== LOGIN SCREEN ===================== -->
  <section id="screen-login" class="screen active">
    <div class="header">
      <h1>🎯 Ultimate CBT Exam</h1>
      <p>Login or create your account</p>
    </div>
    <div class="content">
      <div class="card">
        <h2>🔑 Login</h2>
        <label class="field-label">Select your username</label>
        <select id="loginUserSelect"></select>
        <button class="btn green" id="btnLogin">🔑 Login</button>
        <button class="btn gray small" id="btnRefreshUsers">🔄 Refresh List</button>
      </div>

      <div class="card">
        <h2>📝 Create New Account</h2>
        <label class="field-label">Username (no spaces, min 3 characters)</label>
        <input type="text" id="regUsername" autocomplete="off">
        <label class="field-label">Full Name</label>
        <input type="text" id="regFullname" autocomplete="off">
        <button class="btn" id="btnRegister">✅ Create Account &amp; Start</button>
      </div>

      <div class="status-msg" id="loginStatus"></div>
    </div>
    <footer class="note">All progress is stored on this device.</footer>
  </section>

  <!-- ===================== SUBJECT SELECT SCREEN ===================== -->
  <section id="screen-subjects" class="screen">
    <div class="header">
      <button class="icon-btn logout" id="btnLogoutFromSubjects">🚪 Logout</button>
      <h1 id="subjWelcome">👋 Welcome!</h1>
      <p>Choose a subject to begin your exam</p>
    </div>
    <div class="content" id="subjectList"></div>
  </section>

  <!-- ===================== EXAM SCREEN ===================== -->
  <section id="screen-exam" class="screen">
    <div class="header" style="text-align:left;padding-bottom:10px;">
      <button class="icon-btn logout" id="btnLogoutFromExam">🚪 Logout</button>
      <h1 style="font-size:1.1rem;">🎯 <span id="examSubjectName"></span></h1>
      <p class="sub-info" id="examUserInfo"></p>
      <button class="icon-btn subject" id="btnChangeSubject" style="top:52px;">📚 Change Subject</button>
    </div>
    <div class="exam-topbar">
      <span class="timer" id="examTimer">⏱️ 60:00</span>
      <span class="qcount" id="examQCount">Question 1 of 100</span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="examProgress"></div></div>

    <div class="question-box">
      <div class="q-num" id="examQNum">Question 1 of 100</div>
      <div class="q-text" id="examQText"></div>
      <div id="examOptions"></div>
    </div>
    <div class="stats-line" id="examStats"></div>

    <div class="exam-actions">
      <button class="btn gray" id="btnPrev">◀ Previous</button>
      <button class="btn" id="btnNext">Next ▶</button>
      <button class="btn green" id="btnSubmit">✅ Submit</button>
      <button class="btn purple" id="btnReview">📋 Review</button>
    </div>
    <div class="exam-actions-row2">
      <button class="btn orange" id="btnRestart">🔄 Restart</button>
      <button class="btn outline" id="btnLeaderboardToggle">🏆 Leaderboard</button>
    </div>

    <div class="content" id="examSideInfo" style="display:none;">
      <div class="card">
        <h2>🏆 Top 3 Leaderboard</h2>
        <div id="leaderboardBox"></div>
      </div>
      <div class="card">
        <h2>📊 My Stats</h2>
        <div id="profileBox"></div>
      </div>
    </div>
  </section>

  <!-- ===================== REVIEW SCREEN ===================== -->
  <section id="screen-review" class="screen">
    <div class="header">
      <button class="icon-btn back" id="btnCloseReview">← Back</button>
      <h1>📋 Review Mode</h1>
      <p id="reviewSummary"></p>
    </div>
    <div class="content" id="reviewList"></div>
  </section>

</div>

<script>
/* =====================================================================

const SUBJECT_DATA = {"Mathematics": [{"q": "Solve for x: 2x + 5 = 13", "options": ["3", "4", "5", "6"], "ans": 1}, {"q": "If 3x - 7 = 14, what is x?", "options": ["5", "7", "9", "11"], "ans": 1}, {"q": "Simplify: 4a + 3b - 2a + 5b", "options": ["2a+8b", "6a+8b", "2a+2b", "6a+2b"], "ans": 0}, {"q": "Expand: (x+3)(x-2)", "options": ["x²+x-6", "x²-x-6", "x²+5x-6", "x²-5x-6"], "ans": 0}, {"q": "Factorize: x² - 16", "options": ["(x-4)(x-4)", "(x+4)(x-4)", "(x+4)(x+4)", "x(x-16)"], "ans": 1}, {"q": "Solve: x² - 5x + 6 = 0", "options": ["x=2,3", "x=1,6", "x=-2,-3", "x=-1,-6"], "ans": 0}, {"q": "If y = 3x + 2, find y when x = -1", "options": ["-5", "-1", "1", "5"], "ans": 1}, {"q": "Simplify: (2x³)(3x²)", "options": ["6x⁵", "6x⁶", "5x⁵", "5x⁶"], "ans": 0}, {"q": "Divide: 15x⁵ ÷ 3x²", "options": ["5x³", "5x⁷", "12x³", "12x⁷"], "ans": 0}, {"q": "If x + y = 7 and x - y = 3, find x", "options": ["2", "3", "4", "5"], "ans": 3}, {"q": "Solve: 2(x+3) = 3(x-1)", "options": ["3", "5", "7", "9"], "ans": 3}, {"q": "Simplify: (x²y³)/(xy)", "options": ["xy²", "x²y", "x²y²", "xy³"], "ans": 0}, {"q": "Factorize: 6x² + 5x - 6", "options": ["(2x+3)(3x-2)", "(2x-3)(3x+2)", "(3x+2)(2x-3)", "(3x-2)(2x+3)"], "ans": 0}, {"q": "If x = 2, what is x³ - 2x + 1?", "options": ["5", "7", "9", "11"], "ans": 0}, {"q": "Solve: 5x - 8 = 3x + 4", "options": ["4", "5", "6", "7"], "ans": 2}, {"q": "What is the coefficient of x in 3x² - 5x + 2?", "options": ["3", "-5", "5", "2"], "ans": 1}, {"q": "Simplify: √12 + √27", "options": ["5√3", "√39", "3√5", "√12+√27"], "ans": 0}, {"q": "Rationalize: 1/√3", "options": ["√3/3", "√3", "3/√3", "1/3"], "ans": 0}, {"q": "If x = 3 and y = 4, find x² + y²", "options": ["7", "12", "25", "49"], "ans": 2}, {"q": "Find the value of 3a²b when a=2 and b=3", "options": ["18", "36", "54", "72"], "ans": 1}, {"q": "Simplify: 2x/(x-1) + 3/(x-1)", "options": ["(2x+3)/(x-1)", "(2x-3)/(x-1)", "5/(x-1)", "2x+3"], "ans": 0}, {"q": "Solve: (x+1)/(x-1) = 2", "options": ["1", "2", "3", "4"], /* =====================================================================
   LOCAL "DATABASE" (localStorage-backed)
   ===================================================================== */
const DB = {
  KEYS: { USERS:"cbt_users", USED:"cbt_used_", SCORES:"cbt_scores_" },

  storageOK: true,
  _read(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){ return fallback; }
  },
  _write(key, val){
    try{
      localStorage.setItem(key, JSON.stringify(val));
    }catch(e){
      if(this.storageOK){
        this.storageOK = false;
        alert("⚠️ Storage Unavailable\n\nYour browser (likely Safari Private Browsing) is blocking saved data.\n\nYour progress will NOT be saved after you close this page.\n\nTo fix this: exit Private Browsing mode, or use a regular Safari tab.");
      }
    }
  },

  getUsers(){ return this._read(this.KEYS.USERS, {}); },
  saveUsers(u){ this._write(this.KEYS.USERS, u); },

  createUser(username, fullName){
    const users = this.getUsers();
    if(users[username]) return {ok:false, msg:"Username already exists. Please choose another."};
    users[username] = {
      fullName, created: new Date().toISOString(),
      totalAttempts:0, bestScore:0, bestPercentage:0
    };
    this.saveUsers(users);
    return {ok:true, msg:"User created successfully!"};
  },

  getUser(username){ const users = this.getUsers(); return users[username] || null; },

  usedKey(username, subject){ return `${this.KEYS.USED}${username}__${subject}`; },
  getUsedQuestions(username, subject){ return this._read(this.usedKey(username, subject), []); },
  markUsedQuestions(username, subject, texts){
    const used = new Set(this.getUsedQuestions(username, subject));
    texts.forEach(t=>used.add(t));
    this._write(this.usedKey(username, subject), Array.from(used));
  },
  resetUsedQuestions(username, subject){ this._write(this.usedKey(username, subject), []); },
  getAvailableCount(username, subject, poolSize){
    const usedCount = this.getUsedQuestions(username, subject).length;
    return Math.max(0, poolSize - usedCount);
  },

  scoresKey(username){ return `${this.KEYS.SCORES}${username}`; },
  getScores(username){ return this._read(this.scoresKey(username), []); },
  saveScore(username, subject, score, total, percentage, remark, timeTaken){
    const scores = this.getScores(username);
    scores.unshift({ date:new Date().toISOString(), subject, score, total, percentage, remark, timeTaken });
    this._write(this.scoresKey(username), scores);

    const users = this.getUsers();
    const u = users[username];
    if(u){
      u.totalAttempts = (u.totalAttempts||0) + 1;
      u.bestScore = Math.max(u.bestScore||0, score);
      u.bestPercentage = Math.max(u.bestPercentage||0, percentage);
      this.saveUsers(users);
    }
  },

  getLeaderboard(limit=3){
    const users = this.getUsers();
    return Object.entries(users)
      .filter(([,u]) => (u.bestPercentage||0) > 0)
      .sort((a,b)=> (b[1].bestPercentage||0) - (a[1].bestPercentage||0))
      .slice(0, limit)
      .map(([username,u]) => ({username, fullName:u.fullName, bestScore:u.bestScore, bestPercentage:u.bestPercentage, totalAttempts:u.totalAttempts}));
  }
};

function $(id){ return document.getElementById(id); }
function show(screenId){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $(screenId).classList.add("active");
  window.scrollTo(0,0);
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function sampleWithoutReplacement(arr, n){
  return shuffle(arr).slice(0, n);
}
function fmtTime(totalSeconds){
  const m = Math.floor(totalSeconds/60), s = totalSeconds%60;
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function refreshUserList(){
  const users = DB.getUsers();
  const select = $("loginUserSelect");
  select.innerHTML = "";
  const usernames = Object.keys(users);
  if(usernames.length === 0){
    const opt = document.createElement("option");
    opt.textContent = "No users yet. Create an account below.";
    opt.value = "";
    select.appendChild(opt);
    $("loginStatus").textContent = "📝 No users yet. Create your account below!";
    $("loginStatus").style.color = "#E65100";
  }else{
    usernames.forEach(uname=>{
      const opt = document.createElement("option");
      opt.value = uname;
      opt.textContent = `${uname} (${users[uname].fullName})`;
      select.appendChild(opt);
    });
    $("loginStatus").textContent = `✅ Found ${usernames.length} user(s). Select one and click Login.`;
    $("loginStatus").style.color = "#2E7D32";
  }
}

$("btnRefreshUsers").addEventListener("click", refreshUserList);

$("btnLogin").addEventListener("click", ()=>{
  const uname = $("loginUserSelect").value;
  if(!uname){
    $("loginStatus").textContent = "❌ Please select a valid username";
    $("loginStatus").style.color = "#c62828";
    return;
  }
  const user = DB.getUser(uname);
  if(!user){
    $("loginStatus").textContent = "❌ User not found. Please refresh the list.";
    $("loginStatus").style.color = "#c62828";
    return;
  }
  State.currentUser = uname;
  goToSubjectSelect();
});

$("btnRegister").addEventListener("click", ()=>{
  const username = $("regUsername").value.trim();
  const fullName = $("regFullname").value.trim();
  const statusEl = $("loginStatus");

  if(!username || !fullName){
    statusEl.textContent = "❌ Please fill in all fields (Username and Full Name)";
    statusEl.style.color = "#c62828"; return;
  }
  if(/\s/.test(username)){
    statusEl.textContent = "❌ Username cannot contain spaces";
    statusEl.style.color = "#c62828"; return;
  }
  if(username.length < 3){
    statusEl.textContent = "❌ Username must be at least 3 characters";
    statusEl.style.color = "#c62828"; return;
  }
  if(fullName.length < 2){
    statusEl.textContent = "❌ Please enter your full name";
    statusEl.style.color = "#c62828"; return;
  }

  const result = DB.createUser(username, fullName);
  if(result.ok){
    statusEl.textContent = `✅ ${result.msg}`;
    statusEl.style.color = "#2E7D32";
    $("regUsername").value = "";
    $("regFullname").value = "";
    refreshUserList();
    alert(`Welcome ${fullName}!\n\nYour account "${username}" has been created successfully.\nYou will now be logged in automatically.`);
    State.currentUser = username;
    goToSubjectSelect();
  }else{
    statusEl.textContent = `❌ ${result.msg}`;
    statusEl.style.color = "#c62828";
  }
});

/* =====================================================================
   SUBJECT SELECT SCREEN LOGIC
   ===================================================================== */
function goToSubjectSelect(){
  const user = DB.getUser(State.currentUser);
  $("subjWelcome").textContent = `👋 Welcome, ${State.currentUser}!`;
  const listEl = $("subjectList");
  listEl.innerHTML = "";

  Object.keys(SUBJECT_DATA).forEach(subject=>{
    const pool = SUBJECT_DATA[subject];
    const meta = SUBJECT_META[subject] || {icon:"📘", color:"#424242", desc:""};
    const remaining = DB.getAvailableCount(State.currentUser, subject, pool.length);

    const card = document.createElement("div");
    card.className = "subject-card";
    card.style.borderLeftColor = meta.color;
    card.innerHTML = `
      <div class="emoji">${meta.icon}</div>
      <div class="info">
        <h3>${subject}</h3>
        <p>${meta.desc}</p>
        <p>${pool.length} total • ${remaining} unused for you</p>
      </div>
      <button class="go-btn" style="background:${meta.color}">Start</button>
    `;
    card.querySelector(".go-btn").addEventListener("click", ()=> startExam(subject));
    listEl.appendChild(card);
  });

  show("screen-subjects");
}

$("btnLogoutFromSubjects").addEventListener("click", doLogout);

/* =====================================================================
   EXAM LOGIC
   ===================================================================== */
function selectQuestions(subject){
  const pool = SUBJECT_DATA[subject];
  const poolSize = pool.length;
  const batchSize = Math.min(100, poolSize);
  let usedTexts = new Set(DB.getUsedQuestions(State.currentUser, subject));
  let available = pool.filter(q => !usedTexts.has(q.q));

  if(available.length < batchSize){
    const wantsReset = confirm(
      `🔄 Pool Exhausted\n\nYou have completed all ${poolSize} ${subject} questions!\n` +
      `Would you like to reset the pool and start over?\n` +
      `(OK = reset, Cancel = continue with remaining questions)`
    );
    if(wantsReset){
      DB.resetUsedQuestions(State.currentUser, subject);
      available = pool.slice();
    }else if(available.length === 0){
      DB.resetUsedQuestions(State.currentUser, subject);
      available = pool.slice();
    }
  }

  const selected = available.length >= batchSize
    ? sampleWithoutReplacement(available, batchSize)
    : shuffle(available);

  DB.markUsedQuestions(State.currentUser, subject, selected.map(q=>q.q));
  return selected;
}

function startExam(subject){
  State.currentSubject = subject;
  State.poolSize = SUBJECT_DATA[subject].length;
  State.batchSize = Math.min(100, State.poolSize);
  State.selectedQuestions = selectQuestions(subject);
  State.total = State.selectedQuestions.length;
  State.userAnswers = new Array(State.total).fill(-1);
  State.current = 0;
  State.score = 0;
  State.timeLeft = 3600;
  State.examFinished = false;
  State.startTime = Date.now();

  $("examSubjectName").textContent = subject;
  updateExamHeader();
  $("examSideInfo").style.display = "none";
  updateLeaderboardBox();
  updateProfileBox();

  loadQuestion();
  startTimer();
  show("screen-exam");
}

function updateExamHeader(){
  const remaining = DB.getAvailableCount(State.currentUser, State.currentSubject, State.poolSize);
  $("examUserInfo").textContent =
    `👤 ${State.currentUser}  |  Questions: ${State.total}  |  Remaining in pool: ${remaining}/${State.poolSize}`;
}

function startTimer(){
  if(State.timerHandle) clearInterval(State.timerHandle);
  updateTimerLabel();
  State.timerHandle = setInterval(()=>{
    if(State.examFinished){ clearInterval(State.timerHandle); return; }
    State.timeLeft--;
    updateTimerLabel();
    if(State.timeLeft <= 0){
      clearInterval(State.timerHandle);
      $("examTimer").textContent = "⏱️ TIME'S UP!";
      alert("Time's Up! Your exam will be submitted automatically.");
      submitExam(true);
    }
  }, 1000);
}
function updateTimerLabel(){
  const el = $("examTimer");
  el.textContent = `⏱️ ${fmtTime(Math.max(0,State.timeLeft))}`;
  el.style.color = State.timeLeft <= 60 ? "#c62828" : "#c62828";
}

function loadQuestion(){
  if(State.examFinished) return;
  const q = State.selectedQuestions[State.current];
  $("examQNum").textContent = `Question ${State.current+1} of ${State.total}`;
  $("examQCount").textContent = `Question ${State.current+1} of ${State.total}`;
  $("examQText").textContent = q.q;

  const optsEl = $("examOptions");
  optsEl.innerHTML = "";
  q.options.forEach((opt, i)=>{
    const row = document.createElement("label");
    row.className = "option" + (State.userAnswers[State.current]===i ? " selected" : "");
    row.innerHTML = `<input type="radio" name="opt" value="${i}" ${State.userAnswers[State.current]===i?"checked":""}>
                      <span class="opt-text">${opt}</span>`;
    row.addEventListener("click", ()=>{
      State.userAnswers[State.current] = i;
      document.querySelectorAll("#examOptions .option").forEach(o=>o.classList.remove("selected"));
      row.classList.add("selected");
      row.querySelector("input").checked = true;
      updateStatsLine();
    });
    optsEl.appendChild(row);
  });

  $("examProgress").style.width = `${((State.current+1)/State.total)*100}%`;
  $("btnPrev").disabled = State.current === 0;
  $("btnNext").textContent = (State.current === State.total-1) ? "Finish" : "Next ▶";
  updateStatsLine();
}

function updateStatsLine(){
  const answered = State.userAnswers.filter(a=>a!==-1).length;
  $("examStats").textContent = `📌 Answered: ${answered}/${State.total}  |  Remaining: ${State.total-answered}`;
}

$("btnNext").addEventListener("click", ()=>{
  if(State.examFinished) return;
  if(State.current === State.total-1){
    const unanswered = State.userAnswers.filter(a=>a===-1).length;
    if(unanswered > 0){
      const goBack = confirm(
        `⚠️ You have ${unanswered} unanswered question(s) out of ${State.total}.\n\n` +
        `Would you like to go back and answer them?\n` +
        `(OK = go back, Cancel = force submit anyway)`
      );
      if(goBack){
        State.current = State.userAnswers.findIndex(a=>a===-1);
        loadQuestion();
      }else{
        submitExam(true);
      }
    }else{
      submitExam(false);
    }
  }else{
    State.current++;
    loadQuestion();
  }
});

$("btnPrev").addEventListener("click", ()=>{
  if(State.examFinished || State.current===0) return;
  State.current--;
  loadQuestion();
});

$("btnSubmit").addEventListener("click", ()=> submitExam(false));

function submitExam(force){
  if(State.examFinished) return;
  const unanswered = State.userAnswers.filter(a=>a===-1).length;
  if(unanswered > 0 && !force){
    alert(`⚠️ Incomplete Exam\n\nYou have ${unanswered} unanswered question(s).\n\nYou cannot submit until all questions are answered.`);
    State.current = State.userAnswers.findIndex(a=>a===-1);
    loadQuestion();
    return;
  }

  clearInterval(State.timerHandle);
  const elapsedSec = Math.floor((Date.now()-State.startTime)/1000);
  const timeStr = `${Math.floor(elapsedSec/60)}m ${elapsedSec%60}s`;

  State.score = 0;
  State.selectedQuestions.forEach((q,i)=>{ if(State.userAnswers[i]===q.ans) State.score++; });

  const percentage = (State.score/State.total)*100;
  const remark = percentage>=70 ? "Excellent! 🎉" : percentage>=50 ? "Good! 📘" : "Needs Improvement. 📚";

  DB.saveScore(State.currentUser, State.currentSubject, State.score, State.total, percentage, remark, timeStr);
  State.examFinished = true;

  const remaining = DB.getAvailableCount(State.currentUser, State.currentSubject, State.poolSize);
  alert(
    `🏆 EXAM COMPLETED! 🏆\n\n` +
    `Subject: ${State.currentSubject}\n` +
    `Total Questions: ${State.total}\n` +
    `✅ Correct: ${State.score}\n` +
    `❌ Wrong: ${State.total-State.score}\n` +
    `📊 Score: ${percentage.toFixed(1)}%\n` +
    `⏱️ Time Taken: ${timeStr}\n` +
    `📝 Remark: ${remark}\n\n` +
    `📌 Remaining in pool: ${remaining}/${State.poolSize}`
  );

  updateLeaderboardBox();
  updateProfileBox();
  updateExamHeader();
  openReview();
}

$("btnReview").addEventListener("click", ()=>{
  if(!State.examFinished){
    const unanswered = State.userAnswers.filter(a=>a===-1).length;
    if(unanswered > 0){
      alert(`⚠️ Cannot Review\n\nYou have ${unanswered} unanswered question(s).\n\nYou can only review after submitting the exam.`);
      return;
    }
    submitExam(false);
  }else{
    openReview();
  }
});

function openReview(){
  $("reviewSummary").textContent = `Score: ${State.score}/${State.total} (${(State.score/State.total*100).toFixed(1)}%)`;
  const list = $("reviewList");
  list.innerHTML = "";
  State.selectedQuestions.forEach((q,i)=>{
    const userAns = State.userAnswers[i];
    const correctAns = q.ans;
    const isCorrect = userAns === correctAns;
    const status = userAns === -1 ? "unanswered" : (isCorrect ? "correct" : "wrong");

    const item = document.createElement("div");
    item.className = `review-item ${status}`;
    let optsHtml = "";
    q.options.forEach((opt,j)=>{
      let cls = "";
      if(j===correctAns) cls = "correct-ans";
      else if(j===userAns) cls = "wrong-ans";
      optsHtml += `<div class="review-opt ${cls}">${j===correctAns?"✓ ":(j===userAns?"✗ ":"")}${opt}</div>`;
    });
    const statusIcon = status==="correct" ? "✅" : status==="wrong" ? "❌" : "⚠️";
    item.innerHTML = `<div class="rq">${statusIcon} Q${i+1}: ${q.q}</div>${optsHtml}`;
    list.appendChild(item);
  });
  show("screen-review");
}

$("btnCloseReview").addEventListener("click", ()=>{ show("screen-exam"); });

$("btnRestart").addEventListener("click", ()=>{
  if(!State.examFinished){
    if(!confirm("🔄 Restart\n\nAre you sure you want to restart?\nYour current progress will be lost.")) return;
  }
  State.selectedQuestions = selectQuestions(State.currentSubject);
  State.total = State.selectedQuestions.length;
  State.userAnswers = new Array(State.total).fill(-1);
  State.current = 0;
  State.score = 0;
  State.timeLeft = 3600;
  State.examFinished = false;
  State.startTime = Date.now();

  updateExamHeader();
  loadQuestion();
  startTimer();
  alert(`🔄 Restarted\n\nExam restarted with ${State.total} new shuffled questions!\nGood luck!`);
});

$("btnChangeSubject").addEventListener("click", ()=>{
  if(!State.examFinished){
    if(!confirm("📚 Change Subject\n\nSwitching subjects will end your current exam attempt and your progress on this attempt will be lost.\n\nContinue?")) return;
  }
  clearInterval(State.timerHandle);
  goToSubjectSelect();
});

$("btnLogoutFromExam").addEventListener("click", doLogout);

$("btnLeaderboardToggle").addEventListener("click", ()=>{
  const box = $("examSideInfo");
  box.style.display = box.style.display === "none" ? "block" : "none";
});

function updateLeaderboardBox(){
  const data = DB.getLeaderboard(3);
  const box = $("leaderboardBox");
  if(data.length === 0){
    box.innerHTML = `<div class="lb-row">No scores yet. Be the first!</div>`;
    return;
  }
  const medals = ["🥇","🥈","🥉"];
  box.innerHTML = data.map((d,i)=>`
    <div class="lb-row">
      <span><span class="medal">${medals[i]||(i+1)+"."}</span> ${d.fullName} (${d.username})</span>
      <span>${d.bestScore} (${d.bestPercentage.toFixed(1)}%) • ${d.totalAttempts} att.</span>
    </div>`).join("");
}

function updateProfileBox(){
  const user = DB.getUser(State.currentUser);
  const box = $("profileBox");
  if(!user){ box.innerHTML=""; return; }
  const remaining = DB.getAvailableCount(State.currentUser, State.currentSubject, State.poolSize);
  box.innerHTML = `
    <div class="lb-row"><span>👤 ${user.fullName}</span></div>
    <div class="lb-row"><span>📅 Joined</span><span>${new Date(user.created).toLocaleDateString()}</span></div>
    <div class="lb-row"><span>📝 Attempts</span><span>${user.totalAttempts||0}</span></div>
    <div class="lb-row"><span>🏆 Best</span><span>${user.bestScore||0} (${(user.bestPercentage||0).toFixed(1)}%)</span></div>
    <div class="lb-row"><span>📚 ${State.currentSubject} pool left</span><span>${remaining}/${State.poolSize}</span></div>
  `;
}

/* =====================================================================
   LOGOUT
   ===================================================================== */
function doLogout(){
  if(!confirm("🚪 Logout\n\nAre you sure you want to logout?")) return;
  clearInterval(State.timerHandle);
  State.currentUser = null;
  State.currentSubject = null;
  refreshUserList();
  show("screen-login");
}

/* =====================================================================
   INIT
   ===================================================================== */
refreshUserList();

// Exposed for debugging in the browser console (harmless, not required for normal use).
window.__App = { State, DB, SUBJECT_DATA, submitExam, selectQuestions, startExam };

// Register service worker so the app works fully offline after the first visit.
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("service-worker.js").catch(()=>{
      // Silently ignore — app still works online without offline caching.
    });
  });
}
</script>
